font_size 15.0
disable_ligatures always
scrollback_lines 200000
enable_audio_bell no
shell /usr/bin/fish

cursor none
cursor_text_color background

tab_bar_style           separator
tab_switch_strategy     right
tab_separator           "  "
tab_bar_background      #3c3836
active_tab_foreground   #8ec07c
active_tab_background   #3c3836
active_tab_font_style   normal
inactive_tab_foreground #7c6f64
inactive_tab_background #3c3836
inactive_tab_font_style normal

foreground            #ebdbb2
background            #1d2021
selection_foreground  none
selection_background  #665c54
color0                #1d2021
color8                #1d2021
color1                #fb4934
color9                #fb4934
color2                #b8bb26
color10               #b8bb26
color3                #fabd2f
color11               #fabd2f
color4                #83a598
color12               #83a598
color5                #d3869b
color13               #d3869b
color6                #8ec07c
color14               #8ec07c
color7                #ebdbb2
color15               #ebdbb2
url_color             #ebdbb2
active_border_color   #fe8019
inactive_border_color #3c3836
bell_border_color     #fb4934
mark1_foreground      #1d2021
mark1_background      #fabd2f
mark2_foreground      #1d2021
mark2_background      #fe8019
mark3_foreground      #1d2021
mark3_background      #d3869b

map kitty_mod+] next_tab
map kitty_mod+[ previous_tab
map --when-focus-on var:in_editor kitty_mod+/
map --when-focus-on var:in_editor kitty_mod+h
mouse_map left click ungrabbed mouse_handle_click selection prompt
